<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elçin Sürmelihindi | Profesyonel Portfolyo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Elçin Sürmelihindi</h1>
        <nav>
            <ul>
                <li><a href="#about">Hakkımda</a></li>
                <li><a href="#skills">Yetenekler</a></li>
                <li><a href="#portfolio">Projeler</a></li>
                <li><a href="#certificates">Sertifikalar</a></li>
                <li><a href="#blog">Blog</a></li>
                <li><a href="#contact">İletişim</a></li>
                <li><button id="themeToggle" class="theme-toggle-btn">🌙 Mod</button></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- HAKKIMDA -->
        <section id="about">
            <h2>Hakkımda</h2>
            <p id="aboutContent">Yükleniyor...</p>
        </section>

        <!-- YETENEKLER -->
        <section id="skills">
            <h2>Yeteneklerim</h2>
            <div class="skills-container"></div>
        </section>

        <!-- PROJELER -->
        <section id="portfolio">
            <h2>Projelerim</h2>
            <div class="portfolio-grid"></div>
        </section>

        <!-- SERTİFİKALAR -->
        <section id="certificates">
            <h2>Sertifikalarım & Eğitimlerim</h2>
            <div class="certificates-grid"></div>
        </section>

        <!-- BLOG YAZILARI -->
        <section id="blog">
            <h2>Son Yazılarım</h2>
            <div id="blogContainer"></div> 
        </section>

        <!-- İLETİŞİM FORMU -->
        <section id="contact">
            <h2>Bana Ulaşın</h2>
            <!-- 🎯 Formspree'den aldığın linki tam aşağıdaki action tırnaklarının içine yapıştıracaksın -->
            <form action="https://formspree.io/f/mvzjwzay" method="POST" style="max-width: 600px;">
                <div style="margin-bottom: 12px;">
                    <label>Adınız Soyadınız:</label>
                    <input type="text" name="name" required placeholder="Örn: Ahmet Yılmaz">
                </div>
                <div style="margin-bottom: 12px;">
                    <label>E-posta Adresiniz:</label>
                    <input type="email" name="_replyto" required placeholder="name@example.com" style="width:100%; padding:12px; border:1px solid var(--border-color); border-radius:8px; background:var(--bg-color); color:var(--text-color);">
                </div>
                <div style="margin-bottom: 12px;">
                    <label>Mesajınız:</label>
                    <textarea name="message" rows="5" required placeholder="Mesajınızı buraya yazın..."></textarea>
                </div>
                <button type="submit" style="background-color: var(--accent-color); color: white; border: none; padding: 12px 24px; font-size: 15px; font-weight: 600; border-radius: 8px; cursor: pointer; margin-top: 10px;">Mesajı Gönder</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Elçin Sürmelihindi. Tüm Hakları Saklıdır<a href="admin.html" style="color: inherit; cursor: default; text-decoration: none;">.</a></p>
    </footer>

    <script>
        // ==================== 🌓 KARANLIK MOD SİHRİ ====================
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.innerText = "☀️ Mod";
        }
        themeToggle.addEventListener('click', () => {
            let currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                themeToggle.innerText = "🌙 Mod";
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeToggle.innerText = "☀️ Mod";
            }
        });

        // ==================== 📦 VERİLERİ YÜKLEME ====================
        window.onload = function() {
            document.getElementById('aboutContent').innerText = localStorage.getItem('myAbout') || "Portfolyoma hoş geldiniz.";

            const skillsContainer = document.querySelector('.skills-container');
            const savedSkills = JSON.parse(localStorage.getItem('mySkills')) || [];
            skillsContainer.innerHTML = savedSkills.length === 0 ? '<p>Henüz yetenek eklenmedi.</p>' : '';
            savedSkills.forEach(skill => {
                skillsContainer.innerHTML += `<div class="skill-card"><span>${skill.name}</span><span style="display:block; font-size: 11px; margin-top: 4px; letter-spacing: 2px;">${'⭐'.repeat(skill.level)}</span></div>`;
            });

            const portfolioGrid = document.querySelector('.portfolio-grid');
            const savedProjects = JSON.parse(localStorage.getItem('myProjects')) || [];
            portfolioGrid.innerHTML = savedProjects.length === 0 ? '<p>Henüz proje eklenmedi.</p>' : '';
            savedProjects.forEach((proj, index) => {
                const tagsHTML = proj.tech ? proj.tech.split(',').map(t => `<span class="tag">${t.trim()}</span>`).join('') : '';
                portfolioGrid.innerHTML += `
                    <div class="project-card">
                        <div>
                            <h3>${proj.title}</h3>
                            <div class="project-tags">${tagsHTML}</div>
                            <p>${proj.desc.substring(0, 100)}${proj.desc.length > 100 ? '...' : ''}</p>
                        </div>
                        <button class="view-btn" onclick="openProjectDetails(${index})">Detayı Gör</button>
                    </div>`;
            });

            const certificatesGrid = document.querySelector('.certificates-grid');
            const savedCerts = JSON.parse(localStorage.getItem('myCerts')) || [];
            certificatesGrid.innerHTML = savedCerts.length === 0 ? '<p>Henüz sertifika eklenmedi.</p>' : '';
            savedCerts.forEach(cert => {
                const linkHTML = cert.link ? `<a href="${cert.link}" target="_blank" class="action-link" style="font-size:12px; padding:6px 12px; margin-top:10px;">Sertifikayı Doğrula →</a>` : '';
                certificatesGrid.innerHTML += `<div class="cert-card"><div><h3>${cert.title}</h3><div class="cert-info">🏛️ ${cert.institution}</div></div>${linkHTML}</div>`;
            });

            const blogContainer = document.getElementById('blogContainer');
            const savedBlogs = JSON.parse(localStorage.getItem('myBlogs')) || [];
            blogContainer.innerHTML = savedBlogs.length === 0 ? '<p>Henüz yazı yazılmadı.</p>' : '';
            savedBlogs.forEach(blog => {
                blogContainer.innerHTML += `<article><div class="blog-meta">📅 ${blog.date} | ⏱️ ${blog.readTime} dk okuma</div><h3>${blog.title}</h3><p>${blog.content}</p></article>`;
            });
        };

        window.openProjectDetails = function(index) {
            const savedProjects = JSON.parse(localStorage.getItem('myProjects')) || [];
            const proj = savedProjects[index];
            if(!proj) return;
            document.getElementById('modalTitle').innerText = proj.title;
            document.getElementById('modalDesc').innerText = proj.desc;
            document.getElementById('modalTags').innerHTML = proj.tech ? proj.tech.split(',').map(t => `<span class="tag">${t.trim()}</span>`).join('') : '';
            document.getElementById('modalLinkContainer').innerHTML = proj.link ? `<a href="${proj.link}" target="_blank" class="action-link">GitHub Kaynak Kodunu İncele →</a>` : '';
            document.getElementById('projectModal').style.display = 'flex';
        };

        document.getElementById('closeModal').onclick = function() { document.getElementById('projectModal').style.display = 'none'; };
        window.onclick = function(e) { if (e.target === document.getElementById('projectModal')) { document.getElementById('projectModal').style.display = 'none'; } };
    </script>
</body>
</html>
