<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Admin Management Panel</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; padding: 10px 0; }
        .delete-btn { background-color: #d99a91; padding: 6px 12px; font-size: 12px; border-radius: 6px; color: white; cursor: pointer; border: none; }
        .delete-btn:hover { background-color: #c4837a; }
        .manage-list { list-style: none; margin-top: 15px; }
        .manage-list li { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--bg-color); margin-bottom: 8px; border-radius: 8px; border: 1px solid var(--border-color); font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <h1>System Management Center</h1>
        <nav style="display: flex; align-items: center; gap: 20px;">
            <a href="index.html" style="font-weight: 600; color: var(--accent-color);">Logout to Site</a>
            <button id="themeToggle" class="theme-toggle-btn">🌙 Mode</button>
        </nav>
    </header>

    <!-- 🔐 SECURITY & THEME ENGINE -->
    <script>
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); }

        window.onload = function() {
            const themeToggle = document.getElementById('themeToggle');
            if (localStorage.getItem('theme') === 'dark') { themeToggle.innerText = "☀️ Mode"; }

            const GIZLI_SIFRE = "elcin123"; 
            let girilenSifre = prompt("Please Enter Admin Password:");
            if (girilenSifre !== GIZLI_SIFRE) {
                alert("Incorrect password! Redirecting to home page.");
                window.location.href = "index.html";
                return; 
            }

            document.getElementById('aboutText').value = localStorage.getItem('myAbout') || "";
            renderAll();

            themeToggle.addEventListener('click', () => {
                let currentTheme = document.documentElement.getAttribute('data-theme');
                if (currentTheme === 'dark') {
                    document.documentElement.removeAttribute('data-theme');
                    localStorage.setItem('theme', 'light');
                    themeToggle.innerText = "🌙 Mode";
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    localStorage.setItem('theme', 'dark');
                    themeToggle.innerText = "☀️ Mode";
                }
            });
        };
    </script>

    <main>
        <div class="admin-grid">
            
            <!-- ABOUT ME -->
            <section>
                <h2>About Me Paragraph</h2>
                <form id="aboutForm">
                    <textarea id="aboutText" rows="5" required placeholder="Write your professional bio here..."></textarea>
                    <button type="submit">Update</button>
                </form>
            </section>

            <!-- SKILLS -->
            <section>
                <h2>Add New Skill</h2>
                <form id="skillForm">
                    <input type="text" id="skillName" required placeholder="Skill Name (e.g. C, Python)">
                    <select id="skillLevel" style="margin-top:10px;">
                        <option value="5">⭐⭐⭐⭐⭐</option>
                        <option value="4">⭐⭐⭐⭐</option>
                        <option value="3">⭐⭐⭐</option>
                        <option value="2">⭐⭐</option>
                        <option value="1">⭐</option>
                    </select>
                    <button type="submit">Add Skill</button>
                </form>
                <ul id="adminSkillsList" class="manage-list"></ul>
            </section>

            <!-- PROJECTS -->
            <section>
                <h2>Add Project (Pop-up Supported)</h2>
                <form id="projectForm">
                    <input type="text" id="projectName" required placeholder="Project Title">
                    <input type="text" id="projectTech" placeholder="Technologies (e.g. Python, SQL)">
                    <input type="text" id="projectLink" placeholder="GitHub Repository URL">
                    <textarea id="projectDesc" rows="4" required placeholder="Comprehensive Project Description" style="margin-top:10px;"></textarea>
                    <button type="submit">Add Project</button>
                </form>
                <ul id="adminProjectsList" class="manage-list"></ul>
            </section>

            <!-- SERVICES & STUDY NOTES (TEMİZLENMİŞ HALİ) -->
            <section>
                <h2>Add Service or Study Notes</h2>
                <form id="serviceForm">
                    <select id="serviceType" required>
                        <option value="translation">✍️ Translation Service</option>
                        <option value="notes">📚 Study Notes / Summary</option>
                    </select>
                    <input type="text" id="serviceTitle" required placeholder="Title (e.g. Statistics Study Guide, Academic Translation)">
                    <textarea id="serviceDesc" rows="4" required placeholder="Brief description of topics covered or translation scope..." style="margin-top:10px;"></textarea>
                    
                    <button type="submit" style="margin-top:10px;">Add Item</button>
                </form>
                <ul id="adminServicesList" class="manage-list"></ul>
            </section>

            <!-- CERTIFICATES -->
            <section>
                <h2>Add Certificate</h2>
                <form id="certForm">
                    <input type="text" id="certTitle" required placeholder="Certificate / Course Name">
                    <input type="text" id="certInstitution" required placeholder="Issuing Institution (e.g. BTK Academy)">
                    <input type="text" id="certLink" placeholder="Verification Link (URL)">
                    <button type="submit">Add Certificate</button>
                </form>
                <ul id="adminCertsList" class="manage-list"></ul>
            </section>

            <!-- BLOG -->
            <section>
                <h2>Publish Blog Article</h2>
                <form id="blogForm">
                    <input type="text" id="blogTitle" required placeholder="Article Title">
                    <textarea id="blogContent" rows="4" required placeholder="Blog Content Paragraphs" style="margin-top:10px;"></textarea>
                    <button type="submit">Publish</button>
                </form>
                <ul id="adminBlogsList" class="manage-list"></ul>
            </section>

        </div>
    </main>

    <script>
        // --- FORM HANDLING ACTIONS ---
        document.getElementById('aboutForm').addEventListener('submit', function(e) {
            e.preventDefault();
            localStorage.setItem('myAbout', document.getElementById('aboutText').value);
            alert('About Me updated successfully!');
        });

        document.getElementById('skillForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let items = JSON.parse(localStorage.getItem('mySkills')) || [];
            items.push({ name: document.getElementById('skillName').value, level: parseInt(document.getElementById('skillLevel').value) });
            localStorage.setItem('mySkills', JSON.stringify(items));
            document.getElementById('skillForm').reset();
            renderAll();
        });

        document.getElementById('projectForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let items = JSON.parse(localStorage.getItem('myProjects')) || [];
            items.push({ 
                title: document.getElementById('projectName').value, 
                tech: document.getElementById('projectTech').value, 
                link: document.getElementById('projectLink').value, 
                desc: document.getElementById('projectDesc').value 
            });
            localStorage.setItem('myProjects', JSON.stringify(items));
            document.getElementById('projectForm').reset();
            renderAll();
        });

        document.getElementById('serviceForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let items = JSON.parse(localStorage.getItem('myServices')) || [];
            items.push({
                type: document.getElementById('serviceType').value,
                title: document.getElementById('serviceTitle').value,
                desc: document.getElementById('serviceDesc').value
            });
            localStorage.setItem('myServices', JSON.stringify(items));
            document.getElementById('serviceForm').reset();
            renderAll();
        });

        document.getElementById('certForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let items = JSON.parse(localStorage.getItem('myCerts')) || [];
            items.push({ 
                title: document.getElementById('certTitle').value, 
                institution: document.getElementById('certInstitution').value, 
                link: document.getElementById('certLink').value 
            });
            localStorage.setItem('myCerts', JSON.stringify(items));
            document.getElementById('certForm').reset();
            renderAll();
        });

        document.getElementById('blogForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const content = document.getElementById('blogContent').value;
            const wordsCount = content.split(/\s+/).length;
            const readTime = Math.max(1, Math.ceil(wordsCount / 200));
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            const today = new Date().toLocaleDateString('en-US', options);

            let items = JSON.parse(localStorage.getItem('myBlogs')) || [];
            items.unshift({ title: document.getElementById('blogTitle').value, content: content, date: today, readTime: readTime });
            localStorage.setItem('myBlogs', JSON.stringify(items));
            document.getElementById('blogForm').reset();
            renderAll();
        });

        // --- MANAGEMENT RENDER MOTOR ---
        function renderAll() {
            const listeleriDoldur = (key, elementId) => {
                const items = JSON.parse(localStorage.getItem(key)) || [];
                const el = document.getElementById(elementId);
                el.innerHTML = items.length === 0 ? '<li style="color:#a3aba5;">No items added yet.</li>' : '';
                items.forEach((item, i) => {
                    el.innerHTML += `<li><span><strong>${item.title || item.name}</strong></span><button class="delete-btn" onclick="deleteItem('${key}', ${i})">Delete</button></li>`;
                });
            };
            listeleriDoldur('mySkills', 'adminSkillsList');
            listeleriDoldur('myProjects', 'adminProjectsList');
            listeleriDoldur('myServices', 'adminServicesList');
            listeleriDoldur('myCerts', 'adminCertsList');
            listeleriDoldur('myBlogs', 'adminBlogsList');
        }

        window.deleteItem = function(key, index) {
            let items = JSON.parse(localStorage.getItem(key));
            items.splice(index, 1);
            localStorage.setItem(key, JSON.stringify(items));
            renderAll();
        };
    </script>
</body>
</html>
